name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  managed:
    name: Managed build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Zs.DWFToolkit.slnx

      - name: Build
        run: dotnet build Zs.DWFToolkit.slnx --configuration Release --no-restore

      - name: Test (+ coverage)
        run: >-
          dotnet test Zs.DWFToolkit.slnx
          --configuration Release --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
          if-no-files-found: ignore

  native-default:
    name: Native build (stub W2D, no ODA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Configure + build (default, with native tests)
        run: |
          cmake -S src/Zs.DWFToolkit.Native -B build/native-default -DCMAKE_BUILD_TYPE=Release -DZS_DWF_BUILD_TESTS=ON
          cmake --build build/native-default --config Release -j

      - name: Run native unit tests
        run: ctest --test-dir build/native-default --output-on-failure

      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: native-default-linux-x64
          path: build/native-default/libzs_dwf_toolkit_native.so
          if-no-files-found: warn

  native-oda:
    name: Native build (ODA) ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    rid: linux-x64,   image: quay.io/pypa/manylinux2014_x86_64 }
          - { runner: ubuntu-24.04-arm, rid: linux-arm64, image: quay.io/pypa/manylinux2014_aarch64 }
    steps:
      - uses: actions/checkout@v4

      # Build inside a manylinux2014 (glibc 2.17) container so the resulting .so and
      # worker load on essentially any modern Linux. glibc is backward- but not
      # forward-compatible: a binary built on ubuntu-24.04 (glibc 2.38) refuses to
      # load on older servers. We do NOT use job-level `container:` because GitHub
      # actions (checkout's node20) require glibc 2.28; instead checkout runs on the
      # host and only the compile/test runs in the old-glibc container via docker run.

      - name: Import ODA-modified DWF Toolkit source
        # Runs on the host (has tar/xz); extracts the vendored toolkit into the
        # workspace, which is then bind-mounted into the build container.
        run: |
          sudo apt-get update && sudo apt-get install -y unzip
          ./scripts/setup-oda-dwftoolkit.sh

      - name: Configure + build + test in manylinux2014 (glibc 2.17)
        run: |
          docker run --rm -v "$PWD":/src -w /src ${{ matrix.image }} bash -c '
            set -euo pipefail
            cmake -S src/Zs.DWFToolkit.Native -B build/native-oda \
              -DZS_DWF_ENABLE_ODA_DWFTK=ON -DZS_DWF_WITH_FREETYPE=ON -DZS_DWF_WITH_TIFF=ON \
              -DZS_DWF_BUILD_TESTS=ON -DZS_DWF_PREFER_SYSTEM_JPEG=OFF -DCMAKE_BUILD_TYPE=Release
            # Bounded parallelism: each WhipTk TU needs ~GBs; -j unbounded OOM-kills the runner.
            cmake --build build/native-oda --config Release -j 2
            # Regression samples are committed under tests/data, so no download is needed.
            ctest --test-dir build/native-oda --output-on-failure
          '

      - name: Stage native artifacts (library + worker)
        run: |
          mkdir -p artifacts/native/${{ matrix.rid }}
          cp build/native-oda/libzs_dwf_toolkit_native.so artifacts/native/${{ matrix.rid }}/
          cp build/native-oda/zs_dwf_worker              artifacts/native/${{ matrix.rid }}/

      - name: Upload native artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: native-oda-${{ matrix.rid }}
          path: artifacts/native/${{ matrix.rid }}/
          if-no-files-found: warn

  native-oda-windows:
    name: Native build (ODA) win-x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Import ODA-modified DWF Toolkit source
        shell: bash
        run: ./scripts/setup-oda-dwftoolkit.sh

      - name: Configure + build (ODA + FreeType + TIFF + worker)
        shell: bash
        run: |
          cmake -S src/Zs.DWFToolkit.Native -B build/native-oda -DZS_DWF_ENABLE_ODA_DWFTK=ON -DZS_DWF_WITH_FREETYPE=ON -DZS_DWF_WITH_TIFF=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build/native-oda --config Release --parallel 2

      - name: Stage native artifacts (DLL + worker)
        shell: bash
        run: |
          mkdir -p artifacts/native/win-x64
          find build/native-oda -name 'zs_dwf_toolkit_native.dll' -exec cp {} artifacts/native/win-x64/ \;
          find build/native-oda -name 'zs_dwf_worker.exe'        -exec cp {} artifacts/native/win-x64/ \;
          ls -la artifacts/native/win-x64

      - name: Upload native artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: native-oda-win-x64
          path: artifacts/native/win-x64/
          if-no-files-found: warn

  docker:
    name: Docker image (manual)
    # Heavy (full ODA build); run on demand rather than every push.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t zs-dwftoolkit .
      - name: Smoke test (help)
        run: docker run --rm zs-dwftoolkit --help
