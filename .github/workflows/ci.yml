name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  managed:
    name: Managed build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Zs.DWFToolkit.slnx

      - name: Build
        run: dotnet build Zs.DWFToolkit.slnx --configuration Release --no-restore

      - name: Test (+ coverage)
        run: >-
          dotnet test Zs.DWFToolkit.slnx
          --configuration Release --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults
          if-no-files-found: ignore

  native-default:
    name: Native build (stub W2D, no ODA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Configure + build (default, with native tests)
        run: |
          cmake -S src/Zs.DWFToolkit.Native -B build/native-default -DCMAKE_BUILD_TYPE=Release -DZS_DWF_BUILD_TESTS=ON
          cmake --build build/native-default --config Release -j

      - name: Run native unit tests
        run: ctest --test-dir build/native-default --output-on-failure

      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: native-default-linux-x64
          path: build/native-default/libzs_dwf_toolkit_native.so
          if-no-files-found: warn

  native-oda:
    name: Native build (ODA) ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    rid: linux-x64 }
          - { runner: ubuntu-24.04-arm, rid: linux-arm64 }
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        # All third-party libs (FreeType, libtiff, zlib, libjpeg) are vendored and
        # built from source; only a C/C++ toolchain is needed.
        run: sudo apt-get update && sudo apt-get install -y cmake g++ unzip

      - name: Import ODA-modified DWF Toolkit source
        run: ./scripts/setup-oda-dwftoolkit.sh

      - name: Configure + build (ODA + FreeType + TIFF + worker + tests)
        run: |
          cmake -S src/Zs.DWFToolkit.Native -B build/native-oda -DZS_DWF_ENABLE_ODA_DWFTK=ON -DZS_DWF_WITH_FREETYPE=ON -DZS_DWF_WITH_TIFF=ON -DZS_DWF_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          # Bounded parallelism: each WhipTk TU needs ~GBs; -j unbounded OOM-kills the runner.
          cmake --build build/native-oda --config Release -j 2

      - name: Run native tests (unit + W2D round-trip + ocean/DWF regression + Group4)
        # Regression samples are committed under tests/data, so no download is needed.
        run: ctest --test-dir build/native-oda --output-on-failure

      - name: Stage native artifacts (library + worker)
        run: |
          mkdir -p artifacts/native/${{ matrix.rid }}
          cp build/native-oda/libzs_dwf_toolkit_native.so artifacts/native/${{ matrix.rid }}/
          cp build/native-oda/zs_dwf_worker              artifacts/native/${{ matrix.rid }}/

      - name: Upload native artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: native-oda-${{ matrix.rid }}
          path: artifacts/native/${{ matrix.rid }}/
          if-no-files-found: warn

  docker:
    name: Docker image (manual)
    # Heavy (full ODA build); run on demand rather than every push.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t zs-dwftoolkit .
      - name: Smoke test (help)
        run: docker run --rm zs-dwftoolkit --help
